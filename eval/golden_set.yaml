# Golden-set scenarios for offline evaluation.
# Each: an inbound message + the customer + the expected routing/escalation outcome.
# `expect_primary_owner` is a Team value; `expect_escalation` is whether any
# escalation should fire. Run: `uv run python eval/run_eval.py`.

- message: "I can't sign in and my password reset link is broken"
  customer_id: cust_1000
  expect_primary_owner: identity_access
  expect_escalation: false

